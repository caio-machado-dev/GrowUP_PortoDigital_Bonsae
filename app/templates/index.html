<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bonsae®</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link
      rel="shortcut icon"
      type="imagex/png"
      href="{{url_for('static', filename = '/images/logo_bonsae.png')}}"
    />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  </head>
  <body style="background-color: #1461d3">
    <form action="/precorrecao" method="POST" enctype="multipart/form-data">
      <div
        class="container-fluid d-flex justify-content-center align-items-center"
        style="margin-top: 5vh; margin-bottom: 5vh"
      >
        <div class="container-fluid bg-white p-5 rounded" style="margin: 0 1vh">
          <h1 class="d-flex justify-content-center align-items-center">
            Pré-Correção
          </h1>
          <br />
          <div class="row">
            <div class="col">
              <label for="exampleFormControlInput1" class="form-label"
                >Estado de Competência</label
              >
              <select class="form-select" aria-label="Default select example">
                <option selected>Selecione</option>
                <option value="1">SE</option>
                <option value="2">AL</option>
                <option value="3">SP</option>
              </select>
            </div>
            <div class="col">
              <label for="exampleFormControlInput1" class="form-label"
                >Competência</label
              >
              <select class="form-select" aria-label="Default select example">
                <option selected>Selecione</option>
                <option value="1">Aracaju</option>
                <option value="2">Maceio</option>
                <option value="3">São Paulo</option>
              </select>
            </div>
            <div class="col">
              <label for="exampleFormControlInput1" class="form-label"
                >Segredo</label
              >
              <select class="form-select" aria-label="Default select example">
                <option selected>Selecione</option>
                <option value="1">Sim</option>
                <option value="2">Não</option>
              </select>
            </div>
          </div>
          <br />
          <div class="row">
            <div class="col">
              <label for="exampleFormControlInput1" class="form-label"
                >Assunto do Processo</label
              >
              <select class="form-select" aria-label="Default select example">
                <option selected>Selecione</option>
                <option value="1">Alienação Judicial Bens</option>
              </select>
            </div>
            <div class="col">
              <label for="exampleFormControlInput1" class="form-label"
                >Classe do Processo</label
              >
              <select class="form-select" aria-label="Default select example">
                <option selected>Selecione</option>
                <option value="1">
                  Organização e Fiscalização da Fundação
                </option>
              </select>
            </div>
          </div>
          <br />
          <div class="row">
            <div class="col">
              <label for="exampleFormControlInput1" class="form-label"
                >Parte Contrária</label
              >
              <input
                type="text"
                class="form-control"
                id="formGroupExampleInput"
                placeholder="Insira o Nome da Parte"
              />
            </div>
            <div class="col">
              <label for="exampleFormControlInput1" class="form-label"
                >Tipo</label
              >
              <select class="form-select" aria-label="Default select example">
                <option selected>Selecione</option>
                <option value="1">Pessoa Física</option>
                <option value="2">Pessoa Jurídica</option>
              </select>
            </div>
          </div>
          <br />
          <div class="row">
            <div class="col">
              <h6>
                <img src="{{url_for('static', filename = '/icons/dot.svg')}}" alt="" />Fundamentação Legal
              </h6>
            </div>
          </div>
          <br />
          <div class="row">
            <div class="col-lg-6 col-md-6 col-sm-12">
              <label for="exampleFormControlInput1" class="form-label"
                >Lei</label
              >
              <select
                class="form-select form-select-sm"
                aria-label="Default select example"
              >
                <option selected>Selecione</option>
                <option value="1">Código Cívil - Lei Nº10.406</option>
              </select>
            </div>
            <div class="col">
              <label for="exampleFormControlInput1" class="form-label"
                >Artigo</label
              >
              <select class="form-select" aria-label="Default select example">
                <option value="1" selected>1</option>
                <option value="1">2</option>
              </select>
            </div>
            <div class="col">
              <label for="exampleFormControlInput1" class="form-label"
                >Parágrafos</label
              >
              <select class="form-select" aria-label="Default select example">
                <option value="1" selected>1</option>
                <option value="2">12</option>
              </select>
            </div>
            <div class="col">
              <label for="exampleFormControlInput1" class="form-label"
                >Inciso</label
              >
              <select class="form-select" aria-label="Default select example">
                <option selected>A</option>
                <option value="1">B</option>
              </select>
            </div>
            <div class="col">
              <label for="exampleFormControlInput1" class="form-label"
                >Alinea</label
              >
              <select class="form-select" aria-label="Default select example">
                <option value="x" selected>X</option>
              </select>
            </div>
          </div>
          <br />
          <div class="row">
            <div class="col-lg-6 col-md-6 col-sm-12">
              <label for="exampleFormControlInput1" class="form-label"
                >Lei</label
              >
              <select class="form-select" aria-label="Default select example">
                <option selected>Selecione</option>
                <option value="1">Código Cívil - Lei Nº10.406</option>
              </select>
            </div>
            <div class="col">
              <label for="exampleFormControlInput1" class="form-label"
                >Artigo</label
              >
              <select class="form-select" aria-label="Default select example">
                <option value="1" selected>1</option>
                <option value="2">2</option>
              </select>
            </div>
            <div class="col">
              <label for="exampleFormControlInput1" class="form-label"
                >Parágrafos</label
              >
              <select class="form-select" aria-label="Default select example">
                <option value="1" selected>1</option>
                <option value="2">2</option>
              </select>
            </div>
            <div class="col">
              <label for="exampleFormControlInput1" class="form-label"
                >Inciso</label
              >
              <select class="form-select" aria-label="Default select example">
                <option value="A" selected>A</option>
                <option value="B">B</option>
              </select>
            </div>
            <div class="col">
              <label for="exampleFormControlInput1" class="form-label"
                >Alinea</label
              >
              <select class="form-select" aria-label="Default select example">
                <option value="X" selected>X</option>
              </select>
            </div>
          </div>
          <br />
          <div class="row">
            <div class="col d-flex align-items-center">
              <button
                class="btn btn-sm btn-fundamentacao rounded mt-1 me-2"
                style="background-color: #1461d3"
                type="button"
              >
                <img src="{{url_for('static', filename = '/icons/plus.svg')}}" alt="" />
              </button>
              <strong class="mt-2">Adicionar Fundamentação Legal</strong>
            </div>
            <div class="col justify-content-end bottom-0 end-0 d-flex p-3">
              <button
                id="limparAssuntoClasse"
                class="btn btn-sm btn-limpar rounded mt-1"
                style="background-color: #1461d3; color: white"
                type="button"
              >
                Limpar Seção
              </button>
          </div>
          <br />
          <div class="row original-upload-location">
            <div
              class="col justify-content-end bottom-0 end-0 d-flex p-3 upload-container"
            >
              <input
                type="file"
                name="file"
                class="form-control me-2 w-auto"
                id="inputFile"
                aria-describedby="inputGroupFileAddon04"
                aria-label="Upload"
                accept=".pdf, .docx, .txt"
                style="background-color: #1461d3; color: white;"
                onchange="validadorArquivo()"
              />
              <button
                class="btn btn-outline-secondary d-flex align-items-center justify-content-center"
                type="submit"
                id="inputGroupFileAddon04"
                style="background-color: #1461d3; color: white"
              >
                <img src="{{url_for('static', filename = '/icons/send.svg')}}" alt="icone_de_enviar" />
              </button>
            </div>
          </div>
        </div>
      </div>
    </form>
    <script
      src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
      integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"
      integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy"
      crossorigin="anonymous"
    ></script>
    <script src="{{url_for('static', filename = '/javascript/adicionarFundamentacao.js')}}"></script>
    <script src="{{url_for('static', filename = '/javascript/limparCampos.js')}}"></script>
    <script src="{{url_for('static', filename = '/javascript/validacaoArquivos.js')}}"></script>
    <script>
      const addIconUrl = "{{ url_for('static', filename='/icons/plus.svg') }}";
      const removeIconUrl = "{{ url_for('static', filename='/icons/remove.svg') }}";
    </script>    
  </body>
</html>
